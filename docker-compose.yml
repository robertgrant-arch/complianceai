version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: complianceai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-complianceai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-complianceai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-complianceai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-complianceai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: complianceai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: complianceai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: complianceai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      /usr/bin/mc mb myminio/${S3_BUCKET:-complianceai-recordings} --ignore-existing;
      /usr/bin/mc mb myminio/${S3_TRANSCRIPTS_BUCKET:-complianceai-transcripts} --ignore-existing;
      /usr/bin/mc anonymous set download myminio/${S3_BUCKET:-complianceai-recordings};
      echo 'MinIO buckets initialized';
      exit 0;
      "

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: complianceai-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-complianceai}:${POSTGRES_PASSWORD:-complianceai_secret}@postgres:5432/${POSTGRES_DB:-complianceai}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your-secret-key-change-in-production}
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - S3_BUCKET=${S3_BUCKET:-complianceai-recordings}
      - S3_TRANSCRIPTS_BUCKET=${S3_TRANSCRIPTS_BUCKET:-complianceai-transcripts}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma

  # BullMQ Worker Service
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: complianceai-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-complianceai}:${POSTGRES_PASSWORD:-complianceai_secret}@postgres:5432/${POSTGRES_DB:-complianceai}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - S3_BUCKET=${S3_BUCKET:-complianceai-recordings}
      - S3_TRANSCRIPTS_BUCKET=${S3_TRANSCRIPTS_BUCKET:-complianceai-transcripts}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FIVE9_USERNAME=${FIVE9_USERNAME}
      - FIVE9_PASSWORD=${FIVE9_PASSWORD}
      - FIVE9_DOMAIN_ID=${FIVE9_DOMAIN_ID}
      - FIVE9_S3_BUCKET=${FIVE9_S3_BUCKET}
      - FIVE9_S3_REGION=${FIVE9_S3_REGION:-us-east-1}
      - FIVE9_S3_ACCESS_KEY=${FIVE9_S3_ACCESS_KEY}
      - FIVE9_S3_SECRET_KEY=${FIVE9_S3_SECRET_KEY}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: complianceai-network
